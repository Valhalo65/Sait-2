<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет </title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header class="header">
        <div class="container">
            <a href="#" class="header__logo">
                <img src="img/Логотип.svg" alt="Бит-СП">
                <span class="header__title">
                    Бит-СП
                </span>
            </a>
        </div>
    </header>

    <div class="login-page">
        <div class="login-card">
            <h1 class="login-card__title">
                Личный кабинет
            </h1>
            <form class="login-form">
                <div class="login-form__group">
                    <label class="login-form__label">
                        Логин
                    </label>
                    <input type="text" class="login-form__input">
                </div>
                <div class="login-form__group">
                    <label class="login-form__label">
                        Пароль
                    </label>
                    <div class="login-form__password">
                        <input type="password" class="login-form__input">
                        <button type="button" class="login-form__eye">👁</button>
                    </div>
                </div>
                <div class="login-form__links">
                    <a href="#">
                        Забыли логин или пароль?
                    </a>
                </div>
                <button type="submit" class="login-form__button">
                    Вход
                </button>
            </form>
        </div>
    </div>
</body>

</html>
